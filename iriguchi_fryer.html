<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入口 フライヤー片付け - 給食業務マニュアル</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <a href="yaki.html" class="back-btn">← 焼きメニューに戻る</a>

    <h2 style="color: #FF9800; border-bottom: 2px solid #FF9800;">入口 フライヤー片付け</h2>

    <div class="content-box">
      <ul class="content-list">
        <li>フライヤー左側スイッチをすべてOFF</li>
        <li>モードを1番洗浄</li>
        <li>OMC→自動OFFへ</li>
        <li>入り口側の部品を外す</li>
        <li>肉を入れるバット・ボール洗い→シンク→浄機→乾燥機</li>
        <li>フライヤーの上部分洗い→シンク→洗浄機→乾燥機</li>
        <li>残りの部品洗い→シンク→洗浄機→乾燥機</li>
        <li>洗浄機、全ての部品洗浄後底の部品3つを立てかける。左側小さいボタン長押し</li>
        <li>最後、乾燥機スイッチ→サイン</li>
        <li>シンク洗い・拭き上げ、水切り、排水溝</li>
      </ul>
    </div>
  </div>
</body>

</html>
