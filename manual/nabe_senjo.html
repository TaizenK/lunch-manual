<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>洗浄室準備 - 給食業務マニュアル</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .machine-title {
      font-size: 1.15rem;
      color: #03A9F4;
      /* 鍋の青色 */
      margin-top: 25px;
      margin-bottom: 10px;
      border-bottom: 2px dotted #ccc;
      padding-bottom: 5px;
    }
  </style>
</head>

<body>
  <div class="container">
    <a href="nabe.html" class="back-btn">← 鍋メニューに戻る</a>

    <h2>洗浄室片付け</h2>

    <h3 class="machine-title">コンテナ</h3>
    <div class="content-box">
      <ul class="content-list">
        <li>ドア閉め</li>
        <li>閉栓×2</li>
        <li>スイッチオン</li>
        <li>給水ボタンオン</li>
        <li>温調ボタンオン（※後半の手順）</li>
      </ul>
    </div>

    <h3 class="machine-title">食缶洗浄機</h3>
    <div class="content-box">
      <ul class="content-list">
        <li>筒差し蓋閉め×3</li>
        <li>蒸気・水バルブ</li>
        <li>水栓×3</li>
        <li>外枠を閉める両サイド</li>
        <li>電源オン</li>
        <li>温調ボタンのみオン</li>
      </ul>
    </div>

    <h3 class="machine-title">食器洗浄機</h3>
    <div class="content-box">
      <ul class="content-list">
        <li>元電源オン</li>
        <li>蒸気・水バルブ</li>
        <li>部品つけ・扉閉め両サイド</li>
        <li>オートスタンバイ</li>
        <li>前部分の台設置×4</li>
        <li>蛇腹戻し</li>
      </ul>
    </div>

  </div>
</body>

</html>
