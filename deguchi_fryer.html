    <div class="content-box">
      <ul class="content-list">
        <li>フライヤーの部品を外して台車に乗せて入口へ</li>
        <li>レバー2箇所ひらく</li>
        <li>油回収・冷却もしくは廃油</li>
        <li>筒やキリンを外す</li>
        <li>排出物通り道レバー確認</li>
        <li>油かすをかす切りで集めて排出口へ</li>
        <li>湯で残りのかすを排出口へ</li>
        <li>油投入口の上側から湯をかける</li>
        <li>スチコンクリーナーで上から洗い→流し</li>
        <li>上から拭き上げ、洗い漏れはペーパーで拭き取り</li>
        <li>組み立て</li>
        <li>上の板、重ねる方は取手が横・外向き</li>
        <li>網板は縁の穴が上</li>
        <li>コードは上にかけておく</li>
      </ul>
