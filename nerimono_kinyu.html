<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ねりもの記入法 - 給食業務マニュアル</title>
<link rel="stylesheet" href="style.css">
<style>
  /* ホワイトボードを模したシンプルな黒文字の表デザイン */
  .whiteboard-box {
    background-color: #fff;
    border: 2px solid #333;
    border-radius: 4px;
    padding: 20px;
    color: #000; /* 黒マジックのみの表現 */
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }
  .whiteboard-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 1.1rem;
    font-weight: bold;
    font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
  }
  .whiteboard-table td {
    padding: 8px 4px;
    vertical-align: top;
  }
</style>
</head>
<body>
  <div class="container">
    <a href="nabe.html" class="back-btn">← 鍋メニューに戻る</a>
    
    <h2>ねりもの記入法</h2>
    
    <div class="whiteboard-box">
      <table class="whiteboard-table">
        <tr>
          <td colspan="3">書き方の例</td>
        </tr>
        <tr>
          <td colspan="3" style="height: 15px;"></td>
        </tr>
        <tr>
          <td style="width: 40%;">1/28（水）</td>
          <td style="width: 30%;">ねりもの</td>
          <td style="width: 30%;">泉B欠</td>
        </tr>
        <tr>
          <td colspan="3">&lt;肉じゃが&gt;③</td>
        </tr>
        <tr>
          <td>糸こんにゃく</td>
          <td>26kg</td>
          <td>8.6kg×3</td>
        </tr>
        <tr>
          <td colspan="3">&lt;ツナサラダ&gt;</td>
        </tr>
        <tr>
          <td>ホールコーン</td>
          <td>39kg</td>
          <td>①13.3kg</td>
        </tr>
        <tr>
          <td></td>
          <td></td>
          <td>②③12.8kg</td>
        </tr>
      </table>
    </div>

  </div>
</body>
</html>
