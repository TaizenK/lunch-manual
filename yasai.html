<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>野菜処理（下処理） - 給食業務マニュアル</title>
<link rel="stylesheet" href="style.css">
<style>
  /* 野菜処理ページ用の小見出しスタイル */
  .vegetable-title {
    font-size: 1.15rem;
    color: #4CAF50; /* 下処理の緑色 */
    margin-top: 25px;
    margin-bottom: 10px;
    border-bottom: 2px dotted #ccc;
    padding-bottom: 5px;
  }
</style>
</head>
<body>
  <div class="container">
    <a href="shotoshori.html" class="back-btn">← 下処理メニューに戻る</a>
    
    <h2>野菜処理の作業手順</h2>
    
    <h3 class="vegetable-title">🥬 ニラの切り方</h3>
    <div class="content-box">
      <ul class="content-list">
        <li>根本を5mm〜1cm包丁で切る</li>
        <li>次にハサミで束テープを切る</li>
        <li>葉が悪いときは先端も包丁で切る</li>
      </ul>
    </div>

    <h3 class="vegetable-title">🥬 白菜の切り方</h3>
    <div class="content-box">
      <ul class="content-list">
        <li>寝かせて、お尻の部分がちょうど真ん中を通るように包丁を上から入れる</li>
        <li>包丁が入りきらなかった部分は手で割る（1/4にする時も同様）</li>
        <li>シンクに入れる際は、虫が入ってないか確認して入れる</li>
        <li>直接放り込まずに、ほぐして入れる</li>
      </ul>
    </div>

  </div>
</body>
</html>
